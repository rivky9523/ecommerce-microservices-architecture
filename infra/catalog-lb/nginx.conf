# Nginx load balancer in front of the ProductCatalogService replicas.
#
# Open-source Nginx resolves an "upstream server <name>" only once at startup,
# which does not work with scaled Docker replicas. The reliable pattern is:
#   - use Docker's embedded DNS resolver (127.0.0.11), and
#   - put the target host in a variable used inside proxy_pass.
# Nginx then re-resolves "productcatalog" at request time; Docker DNS returns the
# IPs of all replicas and rotates them, so requests are spread across instances.

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location / {
            # The service DNS name "productcatalog" resolves to all replicas.
            set $catalog_backend productcatalog;
            proxy_pass http://$catalog_backend:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
