# Phase 1 monolith: one API container + one SQL Server container.
# Start everything with:  docker compose up --build
services:

  # --- Relational database (the single store for the whole monolith) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      # Exposed to the host so you can connect with SSMS/Azure Data Studio if you want.
      - "1433:1433"
    healthcheck:
      # Considered healthy once SQL Server answers a trivial query.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_password123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mssql-data:/var/opt/mssql

  # --- The .NET 8 WebAPI monolith ---
  api:
    build:
      context: ./src/ECommerce.Monolith.Api
      dockerfile: Dockerfile
    container_name: ecommerce-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      # Inside the compose network the DB host is the service name "sqlserver".
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=ECommerceMonolith;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
    ports:
      # Browse Swagger at http://localhost:8080/
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  mssql-data:
